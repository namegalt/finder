name: Build Electrobun for Windows

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    # Використовуємо середовище Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest' # Або вкажіть конкретну версію, наприклад '1.1.8'

      - name: Install dependencies
        run: bun install

      - name: Build Electrobun application
        # Припускаємо, що у вашому package.json є скрипт "build", який запускає `electrobun build`
        run: bun run build

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: electrobun-windows-build
          # Вкажіть правильний шлях до папки, куди Electrobun зберігає скомпільований додаток.
          # Зазвичай це може бути папка build/, dist/ або .electrobun/build/
          path: build/