name: Build and Release (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
      prerelease:
        description: 'Is this a pre-release?'
        type: boolean
        default: false

jobs:
  build-windows:
    # Змінено на Windows! Тепер білд йде на Windows Server 2022/2025
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      # Налаштування Bun для Windows
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Якщо для збірки вашого проєкту потрібні інструменти компіляції C++ (MSVC),
      # розкоментуйте цей крок. Якщо це чистий JS/TS — залишайте закоментованим.
      # - name: Setup MSVC Developer Command Prompt
      #   uses: ilammy/msvc-dev-cmd@v1
      #   with:
          # arch: x64

      - name: Install dependencies
        run: bun install

      # Команда збірки вашого проєкту (наприклад, bun run build або bun build.ts)
      - name: Build project
        run: bun run build:canary

      # Створення релізу на GitHub
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          # Вкажіть шлях до готового файлу (наприклад, .exe або .zip архіву)
          # files: |
          #   dist/*.exe
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.prerelease || contains(github.ref_name, '-beta') || contains(github.event.inputs.tag, '-beta') }}